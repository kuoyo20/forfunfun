{% extends "base.html" %}
{% block title %}忘記密碼 - 人脈管理系統{% endblock %}
{% block content %}
<div class="auth-card">
    <h2>忘記密碼</h2>

    {% if step == 'question' %}
    <form method="post" action="/forgot-password">
        <input type="hidden" name="step" value="question">
        <input type="hidden" name="username" value="{{ username }}">
        <p>帳號：<strong>{{ username }}</strong></p>
        <label>{{ security_question }}
            <input type="text" name="security_answer" required autofocus placeholder="請輸入答案">
        </label>
        <label>新密碼
            <input type="password" name="new_password" required minlength="6" placeholder="至少 6 個字元">
        </label>
        <label>確認新密碼
            <input type="password" name="new_password_confirm" required placeholder="再輸入一次">
        </label>
        <button type="submit" style="width: 100%; margin-top: 0.5rem;">重設密碼</button>
    </form>
    {% else %}
    <form method="post" action="/forgot-password">
        <input type="hidden" name="step" value="lookup">
        <label>帳號
            <input type="text" name="username" required autofocus placeholder="請輸入帳號">
        </label>
        <button type="submit" style="width: 100%; margin-top: 0.5rem;">下一步</button>
    </form>
    {% endif %}

    <div class="auth-footer">
        <a href="/login">回到登入</a>
    </div>
</div>
{% endblock %}
