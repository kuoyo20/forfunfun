{% extends "base.html" %}
{% block title %}忘記密碼 - 人脈管理系統{% endblock %}
{% block content %}
<article style="max-width: 420px; margin: 3rem auto; padding: 2rem;">
    <h2 style="text-align: center;">忘記密碼</h2>

    {% if step == 'question' %}
    <form method="post" action="/forgot-password">
        <input type="hidden" name="step" value="question">
        <input type="hidden" name="username" value="{{ username }}">
        <p>帳號：<strong>{{ username }}</strong></p>
        <label>{{ security_question }}
            <input type="text" name="security_answer" required autofocus>
        </label>
        <label>新密碼
            <input type="password" name="new_password" required minlength="6">
        </label>
        <label>確認新密碼
            <input type="password" name="new_password_confirm" required>
        </label>
        <button type="submit" style="width: 100%;">重設密碼</button>
    </form>
    {% else %}
    <form method="post" action="/forgot-password">
        <input type="hidden" name="step" value="lookup">
        <label>帳號
            <input type="text" name="username" required autofocus>
        </label>
        <button type="submit" style="width: 100%;">下一步</button>
    </form>
    {% endif %}

    <p style="text-align: center; margin-top: 1rem;">
        <a href="/login">回到登入</a>
    </p>
</article>
{% endblock %}
