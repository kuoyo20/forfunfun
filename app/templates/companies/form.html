{% extends "base.html" %}
{% block title %}{{ '編輯' if company else '新增' }}公司 - 人脈管理系統{% endblock %}
{% block content %}
<h2>{{ '編輯' if company else '新增' }}公司</h2>

<form method="post" action="{{ '/companies/' ~ company.id ~ '/edit' if company else '/companies/new' }}">
    <div class="grid-2">
        <label>公司名稱 *
            <input type="text" name="name" value="{{ company.name if company else '' }}" required>
        </label>
        <label>網域
            <input type="text" name="domain" value="{{ company.domain if company else '' }}" placeholder="example.com">
        </label>
    </div>
    <div class="grid-2">
        <label>產業
            <input type="text" name="industry" value="{{ company.industry if company else '' }}" placeholder="科技、金融、製造...">
        </label>
        <label>網站
            <input type="url" name="website" value="{{ company.website if company else '' }}" placeholder="https://example.com">
        </label>
    </div>
    <label>地址
        <input type="text" name="address" value="{{ company.address if company else '' }}">
    </label>
    <label>備註
        <textarea name="notes" rows="3">{{ company.notes if company else '' }}</textarea>
    </label>
    <div class="btn-group">
        <button type="submit">儲存</button>
        <a href="/companies" role="button" class="btn-secondary">取消</a>
    </div>
</form>
{% endblock %}
