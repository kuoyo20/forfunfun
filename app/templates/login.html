{% extends "base.html" %}
{% block title %}登入 - 人脈管理系統{% endblock %}
{% block content %}
<article style="max-width: 400px; margin: 3rem auto; padding: 2rem;">
    <h2 style="text-align: center;">登入</h2>
    <form method="post" action="/login">
        <label>帳號
            <input type="text" name="username" required autofocus>
        </label>
        <label>密碼
            <input type="password" name="password" required>
        </label>
        <button type="submit" style="width: 100%;">登入</button>
    </form>
    <p style="text-align: center; margin-top: 1rem;">
        還沒有帳號？ <a href="/register">註冊</a> ｜ <a href="/forgot-password">忘記密碼？</a>
    </p>
</article>
{% endblock %}
