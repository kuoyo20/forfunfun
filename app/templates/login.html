{% extends "base.html" %}
{% block title %}登入 - 人脈管理系統{% endblock %}
{% block content %}
<div class="auth-card">
    <h2>登入</h2>
    <form method="post" action="/login">
        <label>帳號
            <input type="text" name="username" required autofocus placeholder="請輸入帳號">
        </label>
        <label>密碼
            <input type="password" name="password" required placeholder="請輸入密碼">
        </label>
        <button type="submit" style="width: 100%; margin-top: 0.5rem;">登入</button>
    </form>
    <div class="auth-footer">
        還沒有帳號？ <a href="/register">註冊</a> &nbsp;|&nbsp; <a href="/forgot-password">忘記密碼？</a>
    </div>
</div>
{% endblock %}
